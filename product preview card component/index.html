<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="preview.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="preview-card-container">
        <div class="card-image">
          <img src="./images/image-product-mobile.jpg" alt="perfume-image" class="perfume-image">

        </div>
        <div class="detail-card">
            <p class="product-name">P E R F U M E</p>
            <h1>Garbrielle Essence Eau De Parfum</h1>

            <div class="price">
              <h2>$149.99</h2>
              <span>$169.99</span>
            </div> 
            <div class="button">
                <img src="images/icon-cart.svg" alt="cart icon">
                <p>Add to Cart</p>
            </div>
        </div>
    </div>
